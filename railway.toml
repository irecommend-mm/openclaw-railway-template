[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Railway: add a Volume → mount path MUST be /data (same path entrypoint uses).
# Optional (reminders): OPENCLAW_USER_TIMEZONE=Asia/Yangon  OPENCLAW_HEARTBEAT_EVERY=15m
# File reminders poll interval (ms, min 5000): RAILWAY_REMINDER_POLL_MS=30000
# Set OPENCLAW_HEARTBEAT_TARGET=skip to keep upstream default (no DM delivery).
# If not on Railway but your /data volume is small: OPENCLAW_USE_IMAGE_BREW=1
# Stricter OpenClaw device auth (cron may require Control UI pairing): OPENCLAW_STRICT_DEVICE_AUTH=1
[variables]
PORT = "8080"
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
